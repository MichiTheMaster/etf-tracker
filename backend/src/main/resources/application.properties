spring.application.name=backend

server.port=8081

jwt.secret=${JWT_SECRET:dev-secret-key-change-me-please-1234567890}

# --- MySQL Datenbank ---
spring.datasource.url=${DB_URL:jdbc:h2:mem:backend;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.data-source-properties.zeroDateTimeBehavior=CONVERT_TO_NULL

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional: schöneres SQL-Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# --- Marktdaten ---
# Yahoo Finance wird verwendet (kein API-Key noetig)
# Unterstuetzt europaeische ETFs: VWCE.DE, EUNL.DE, EMIM.DE, SXR8.DE, EXSA.DE
ter.fallback.file=./src/main/resources/ter-fallbacks.properties
ter.autoupdate.cron=0 30 2 * * *
ter.autoupdate.fixed-delay-ms=21600000
ter.autoupdate.fixed-initial-delay-ms=900000
app.market.fallback-prices-enabled=${APP_MARKET_FALLBACK_PRICES_ENABLED:true}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:3000}
app.email-verification.required=${APP_EMAIL_VERIFICATION_REQUIRED:false}
app.email-verification.token-valid-hours=${APP_EMAIL_VERIFICATION_TOKEN_VALID_HOURS:24}
app.mail.from=${APP_MAIL_FROM:no-reply@etf-tracker.local}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- Privacy / Logging toggles ---
# Truncate stored IPs to /24 (IPv4) or /64 (IPv6) prefix before persisting
app.privacy.ip-truncation.enabled=${APP_PRIVACY_IP_TRUNCATION_ENABLED:true}
# Redact sensitive JSON keys (password, token, ssn, creditCard, cvv) from request body logs
app.privacy.log-masking.enabled=${APP_PRIVACY_LOG_MASKING_ENABLED:true}

# --- Log retention (days) ---
app.logging.audit.retention-days=${APP_LOGGING_AUDIT_RETENTION_DAYS:365}
app.logging.session.retention-days=${APP_LOGGING_SESSION_RETENTION_DAYS:90}
